
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0;max-width:800px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.title{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.subtitle{font-size:13px;color:var(--color-text-secondary);margin-top:2px}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-secondary);font-weight:500}
.phase-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:10px;overflow:hidden}
.phase-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
.phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phase-title{font-size:14px;font-weight:500;color:var(--color-text-primary);flex:1}
.phase-meta{font-size:12px;color:var(--color-text-secondary)}
.phase-chevron{font-size:11px;color:var(--color-text-tertiary);transition:transform .2s}
.phase-chevron.open{transform:rotate(90deg)}
.phase-body{border-top:0.5px solid var(--color-border-tertiary);padding:0}
.task-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:0.5px solid var(--color-border-tertiary);transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--color-background-secondary)}
.task-check{width:16px;height:16px;border-radius:4px;border:0.5px solid var(--color-border-secondary);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.task-check.done{background:#639922;border-color:#639922;color:#EAF3DE}
.task-label{font-size:13px;color:var(--color-text-primary);flex:1}
.task-label.done{text-decoration:line-through;color:var(--color-text-tertiary)}
.task-day{font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary);padding:2px 7px;border-radius:var(--border-radius-md)}
.progress-bar-wrap{height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;margin-top:8px;margin-bottom:2px}
.progress-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1.25rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-lbl{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.git-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px}
.git-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px}
.git-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;flex-wrap:wrap}
.git-label{font-size:12px;color:var(--color-text-secondary);min-width:70px;padding-top:8px}
select,input[type=text]{flex:1;min-width:140px;font-size:13px;padding:7px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.code-block{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 14px;font-family:var(--font-mono);font-size:12px;color:var(--color-text-primary);margin-top:8px;word-break:break-all;line-height:1.7;user-select:all}
.copy-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;margin-top:6px;transition:background .15s}
.copy-btn:hover{background:var(--color-background-secondary)}
.section-sep{height:1px;background:var(--color-border-tertiary);margin:1.25rem 0}
.badge{font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);font-weight:500}
.badge-todo{background:#E6F1FB;color:#185FA5}
.badge-doing{background:#FAEEDA;color:#854F0B}
.badge-done{background:#EAF3DE;color:#3B6D11}
</style>

<div class="wrap">
<h2 class="sr-only">Crypto pipeline project tracker with daily Git commit helper</h2>

<div class="header">
  <div>
    <div class="title">Crypto Pipeline Tracker</div>
    <div class="subtitle">28-day build plan · CoinGecko → Kafka → Spark → Snowflake → Grafana</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('board')">Board</div>
  <div class="tab" onclick="showTab('git')">Daily Git Push</div>
</div>

<div id="tab-board">
  <div class="stats" id="stats-row"></div>
  <div id="phases-list"></div>
</div>

<div id="tab-git" style="display:none">
  <div class="git-box">
    <div class="git-title">Daily commit message generator</div>
    <div class="git-row">
      <span class="git-label">Phase</span>
      <select id="sel-phase">
        <option value="Phase 1: Setup">Phase 1 · Setup & Kafka basics</option>
        <option value="Phase 2: Kafka Producer">Phase 2 · Kafka Producer</option>
        <option value="Phase 3: Spark Streaming">Phase 3 · Spark Streaming</option>
        <option value="Phase 4: Snowflake">Phase 4 · Snowflake layers</option>
        <option value="Phase 5: Grafana">Phase 5 · Grafana dashboard</option>
        <option value="Phase 6: Anomaly Detection">Phase 6 · Anomaly detection</option>
        <option value="Phase 7: Cleanup">Phase 7 · README & cleanup</option>
      </select>
    </div>
    <div class="git-row">
      <span class="git-label">What you did</span>
      <input type="text" id="inp-what" placeholder="e.g. added producer loop, fixed offset config" />
    </div>
    <button class="copy-btn" onclick="genCommit()">Generate commit message</button>
    <div id="commit-out" style="display:none">
      <div class="code-block" id="commit-text"></div>
      <button class="copy-btn" onclick="copyCommit()">Copy</button>
      <div class="section-sep"></div>
      <div class="git-title" style="margin-bottom:8px">Full daily push commands</div>
      <div class="code-block" id="push-cmds"></div>
      <button class="copy-btn" onclick="copyPush()">Copy commands</button>
    </div>
  </div>
</div>
</div>

<script>
const PHASES=[
  {id:0,label:"Phase 1",name:"Setup & Kafka Basics",days:"Days 1–7",color:"#378ADD",tasks:[
    {d:"Day 1",t:"Watch Fireship 'Kafka in 100 seconds' on YouTube"},
    {d:"Day 2",t:"Watch Confluent Kafka crash course (45 min)"},
    {d:"Day 3",t:"Install Docker + Docker Compose"},
    {d:"Day 4",t:"Run Kafka + Zookeeper with docker-compose.yml"},
    {d:"Day 5",t:"Write test_producer.py — send one hardcoded message"},
    {d:"Day 6",t:"Write test_consumer.py — read message back"},
    {d:"Day 7",t:"Confirm hello kafka message prints — milestone done"},
  ]},
  {id:1,label:"Phase 2",name:"Kafka Producer",days:"Days 4–7",color:"#1D9E75",tasks:[
    {d:"Day 4",t:"Create CoinGecko free account, get API key"},
    {d:"Day 5",t:"Write producer.py fetching BTC/ETH/SOL prices"},
    {d:"Day 6",t:"Add timestamp to each message"},
    {d:"Day 7",t:"Run producer in loop every 60 seconds — verify messages flow"},
  ]},
  {id:2,label:"Phase 3",name:"Spark Structured Streaming",days:"Days 8–14",color:"#D85A30",tasks:[
    {d:"Day 8",t:"Install PySpark + Kafka connector jar"},
    {d:"Day 9",t:"Write spark_consumer.py — connect to Kafka topic"},
    {d:"Day 10",t:"Define JSON schema for incoming messages"},
    {d:"Day 11",t:"Parse messages with from_json + select columns"},
    {d:"Day 12",t:"Add 10-minute sliding window aggregation"},
    {d:"Day 13",t:"Compute avg + stddev per coin per window"},
    {d:"Day 14",t:"Write stream to console sink — verify windowed output"},
  ]},
  {id:3,label:"Phase 4",name:"Snowflake Storage",days:"Days 15–18",color:"#7F77DD",tasks:[
    {d:"Day 15",t:"Create Snowflake free trial account"},
    {d:"Day 16",t:"Create RAW layer table — crypto_raw.prices"},
    {d:"Day 16",t:"Create SILVER layer — crypto_clean.prices (parsed, typed)"},
    {d:"Day 17",t:"Create GOLD layer — crypto_analytics.price_trends"},
    {d:"Day 17",t:"Add clustering keys on coin_name + timestamp"},
    {d:"Day 18",t:"Create TASK to run aggregation every 15 minutes"},
    {d:"Day 18",t:"Connect Spark → Snowflake with connector, test write"},
  ]},
  {id:4,label:"Phase 5",name:"Grafana Dashboard",days:"Days 19–22",color:"#BA7517",tasks:[
    {d:"Day 19",t:"Install Grafana locally via Docker"},
    {d:"Day 19",t:"Install Snowflake plugin for Grafana"},
    {d:"Day 20",t:"Build Panel 1 — live price line chart BTC/ETH/SOL"},
    {d:"Day 21",t:"Build Panel 2 — 24hr % change gauge with green/red"},
    {d:"Day 21",t:"Build Panel 3 — anomaly alert table (z-score > 2)"},
    {d:"Day 22",t:"Build Panel 4 — rolling 1hr average trend line"},
    {d:"Day 22",t:"Take screenshot for README + resume"},
  ]},
  {id:5,label:"Phase 6",name:"Anomaly Detection",days:"Days 23–25",color:"#A32D2D",tasks:[
    {d:"Day 23",t:"Write detect_anomaly() with z-score formula"},
    {d:"Day 24",t:"Integrate z-score into Spark windowed stream"},
    {d:"Day 25",t:"Flag anomalies in Snowflake GOLD layer"},
    {d:"Day 25",t:"Verify Grafana anomaly table shows flagged rows"},
  ]},
  {id:6,label:"Phase 7",name:"README & Cleanup",days:"Days 26–28",color:"#5F5E5A",tasks:[
    {d:"Day 26",t:"Draw architecture diagram on excalidraw.com, export PNG"},
    {d:"Day 26",t:"Write README — problem statement + pipeline flow"},
    {d:"Day 27",t:"Add setup instructions (docker compose command, env vars)"},
    {d:"Day 27",t:"Add tech stack badges, dashboard screenshot"},
    {d:"Day 28",t:"Write Key Learnings (5 bullets) + Future Improvements"},
    {d:"Day 28",t:"Final review — ensure all phases working end-to-end"},
  ]},
];

const DONE_KEY='crypto_tracker_done_v1';
let done=new Set(JSON.parse(localStorage.getItem?.(DONE_KEY)||'[]'));
let open=new Set([0]);

function saveState(){try{localStorage.setItem(DONE_KEY,JSON.stringify([...done]))}catch(e){}}

function toggleTask(phaseId,taskIdx){
  const key=`${phaseId}-${taskIdx}`;
  done.has(key)?done.delete(key):done.add(key);
  saveState();
  renderAll();
}

function togglePhase(id){
  open.has(id)?open.delete(id):open.add(id);
  renderAll();
}

function getPhaseProgress(p){
  const total=p.tasks.length;
  const doneCount=p.tasks.filter((_,i)=>done.has(`${p.id}-${i}`)).length;
  return{total,doneCount,pct:total?Math.round(doneCount/total*100):0};
}

function renderStats(){
  const totalTasks=PHASES.flatMap(p=>p.tasks).length;
  const doneCount=done.size;
  const phases=PHASES.filter(p=>getPhaseProgress(p).pct===100).length;
  const streak=calculateStreak();
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-num">${doneCount}</div><div class="stat-lbl">tasks done</div></div>
    <div class="stat-card"><div class="stat-num">${totalTasks-doneCount}</div><div class="stat-lbl">remaining</div></div>
    <div class="stat-card"><div class="stat-num">${phases}</div><div class="stat-lbl">phases complete</div></div>
    <div class="stat-card"><div class="stat-num">${Math.round(doneCount/totalTasks*100)}%</div><div class="stat-lbl">overall progress</div></div>
  `;
}

function calculateStreak(){return 0;}

function statusBadge(pct){
  if(pct===0)return`<span class="badge badge-todo">Not started</span>`;
  if(pct===100)return`<span class="badge badge-done">Complete</span>`;
  return`<span class="badge badge-doing">In progress</span>`;
}

function renderPhases(){
  const el=document.getElementById('phases-list');
  el.innerHTML=PHASES.map(p=>{
    const{total,doneCount,pct}=getPhaseProgress(p);
    const isOpen=open.has(p.id);
    return`<div class="phase-card">
      <div class="phase-header" onclick="togglePhase(${p.id})">
        <div class="phase-dot" style="background:${p.color}"></div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="phase-title">${p.label} · ${p.name}</span>
            ${statusBadge(pct)}
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
            <div class="progress-bar-wrap" style="flex:1;max-width:160px">
              <div class="progress-bar-fill" style="width:${pct}%;background:${p.color}"></div>
            </div>
            <span style="font-size:11px;color:var(--color-text-tertiary)">${doneCount}/${total} · ${p.days}</span>
          </div>
        </div>
        <div class="phase-chevron ${isOpen?'open':''}">&#9654;</div>
      </div>
      ${isOpen?`<div class="phase-body">${p.tasks.map((t,i)=>{
        const key=`${p.id}-${i}`;
        const isDone=done.has(key);
        return`<div class="task-row">
          <div class="task-check ${isDone?'done':''}" onclick="toggleTask(${p.id},${i})">${isDone?'✓':''}</div>
          <span class="task-label ${isDone?'done':''}">${t.t}</span>
          <span class="task-day">${t.d}</span>
        </div>`;
      }).join('')}</div>`:''}
    </div>`;
  }).join('');
}

function renderAll(){renderStats();renderPhases();}

function showTab(t){
  document.getElementById('tab-board').style.display=t==='board'?'block':'none';
  document.getElementById('tab-git').style.display=t==='git'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['board','git'][i]===t);
  });
}

function genCommit(){
  const phase=document.getElementById('sel-phase').value;
  const what=document.getElementById('inp-what').value.trim()||'daily progress';
  const today=new Date().toISOString().slice(0,10);
  const msg=`feat(${phase.split(':')[0].toLowerCase().replace(/ /g,'-')}): ${what}`;
  const cmds=`git add .\ngit commit -m "${msg}"\ngit push origin main`;
  document.getElementById('commit-text').textContent=msg;
  document.getElementById('push-cmds').textContent=cmds;
  document.getElementById('commit-out').style.display='block';
}

function copyCommit(){
  const t=document.getElementById('commit-text').textContent;
  navigator.clipboard.writeText(t).catch(()=>{});
}
function copyPush(){
  const t=document.getElementById('push-cmds').textContent;
  navigator.clipboard.writeText(t).catch(()=>{});
}

renderAll();
</script>
